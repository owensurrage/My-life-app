<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="My Life"/>
<meta name="theme-color" content="#0F0F13"/>
<title>My Life</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0C0C14;--surf:#18182A;--surf2:#20203A;--bdr:#2A2A44;
  --purple:#8B7FE8;--green:#52C47A;--orange:#F0922B;--red:#E05C5C;--blue:#5BA3D9;--gold:#F5C842;
  --text:#F0EEF8;--muted:#8888AA;--dim:#44446A;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --radius:16px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative;}

/* ── FOCUS HEADER ─────────────────────────────────── */
.focus-hdr{
  padding:calc(var(--st) + 16px) 18px 14px;
  background:linear-gradient(180deg,#14142A 0%,var(--bg) 100%);
  flex-shrink:0;
}
.focus-top{display:flex;justify-content:space-between;align-items:center;}
.focus-date{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
.focus-greeting{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-top:2px;}
.progress-strip{display:flex;gap:6px;margin-top:12px;align-items:center;}
.pring{flex-shrink:0;}
.pring-wrap{position:relative;display:inline-flex;}
.pring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.pring-pct{font-size:12px;font-weight:800;line-height:1;}
.pring-sub{font-size:8px;color:var(--muted);margin-top:1px;}
.focus-pills{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
.fpill{background:var(--surf);border:1px solid var(--bdr);border-radius:20px;padding:5px 10px;font-size:10px;font-weight:700;color:var(--muted);white-space:nowrap;}
.fpill.warn{color:var(--orange);border-color:rgba(240,146,43,.3);background:rgba(240,146,43,.08);}
.fpill.good{color:var(--green);border-color:rgba(82,196,122,.3);background:rgba(82,196,122,.08);}
.fpill.danger{color:var(--red);border-color:rgba(224,92,92,.3);background:rgba(224,92,92,.08);}

/* ── BOTTOM NAV ───────────────────────────────────── */
.bnav{
  display:flex;background:#10101E;border-top:1px solid var(--bdr);
  padding:6px 8px calc(var(--sb) + 6px);flex-shrink:0;
}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:5px 0;border-radius:10px;transition:background .15s;}
.nb:active{background:rgba(139,127,232,.1);}
.nb .ni{font-size:21px;line-height:1;transition:transform .2s;}
.nb.act .ni{transform:scale(1.15);}
.nb .nl{font-size:9px;color:var(--muted);font-weight:600;transition:color .2s;}
.nb.act .nl{color:var(--purple);}

/* ── SCROLL AREA ──────────────────────────────────── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{width:0;}
.page{padding:14px 16px calc(var(--sb) + 70px);}

/* ── SECTION HEADER ───────────────────────────────── */
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.sec-title{font-size:18px;font-weight:800;letter-spacing:-.3px;}
.sec-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.add-btn{width:34px;height:34px;border-radius:50%;background:var(--purple);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(139,127,232,.4);}

/* ── TODAY FOCUS CARD ─────────────────────────────── */
.focus-card{
  background:linear-gradient(135deg,#1E1A3E 0%,#1A1E3A 100%);
  border:1px solid rgba(139,127,232,.25);
  border-radius:var(--radius);padding:18px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.focus-card::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:radial-gradient(circle,rgba(139,127,232,.15) 0%,transparent 70%);}
.fc-label{font-size:10px;color:var(--purple);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.fc-title{font-size:20px;font-weight:900;line-height:1.2;margin-bottom:4px;}
.fc-sub{font-size:12px;color:var(--muted);line-height:1.4;}
.fc-action{display:inline-flex;align-items:center;gap:6px;margin-top:12px;background:var(--purple);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;}

/* ── HABIT CARD ───────────────────────────────────── */
.habit-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.hcard{
  display:flex;align-items:center;gap:12px;
  background:var(--surf);border:1.5px solid var(--bdr);
  border-radius:14px;padding:14px 14px;
  cursor:pointer;transition:all .18s;user-select:none;
  -webkit-user-select:none;
}
.hcard:active{transform:scale(.97);}
.hcard.done{background:#182818;border-color:rgba(82,196,122,.35);}
.hcard.done .hname{color:var(--muted);text-decoration:line-through;}
.hchk{width:26px;height:26px;border-radius:50%;border:2.5px solid var(--dim);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all .2s;}
.hcard.done .hchk{background:var(--green);border-color:var(--green);}
.hico{font-size:20px;flex-shrink:0;}
.hinfo{flex:1;}
.hname{font-size:14px;font-weight:700;transition:all .2s;}
.hstreak{font-size:11px;color:var(--orange);margin-top:2px;font-weight:600;}

/* ── PRIORITY TASK ────────────────────────────────── */
.ptask{
  background:var(--surf);border-radius:14px;padding:14px;margin-bottom:9px;
  border-left:4px solid var(--purple);transition:all .18s;
}
.ptask:active{transform:scale(.98);}
.ptask.pri-urgent{border-left-color:var(--red);}
.ptask.pri-high{border-left-color:var(--orange);}
.ptask.pri-medium{border-left-color:var(--purple);}
.ptask.pri-low{border-left-color:var(--green);}
.ptask.done-t{opacity:.45;}
.pt-row{display:flex;align-items:flex-start;gap:10px;}
.pt-chk{width:22px;height:22px;border-radius:5px;border:2px solid var(--dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;margin-top:1px;transition:all .2s;}
.ptask.done-t .pt-chk{background:var(--green);border-color:var(--green);}
.pt-body{flex:1;}
.pt-name{font-size:14px;font-weight:700;line-height:1.3;}
.ptask.done-t .pt-name{text-decoration:line-through;}
.pt-meta{display:flex;align-items:center;gap:7px;margin-top:6px;flex-wrap:wrap;}
.dl-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;}
.dl-over{background:rgba(224,92,92,.2);color:var(--red);}
.dl-today{background:rgba(240,146,43,.2);color:var(--orange);}
.dl-soon{background:rgba(240,146,43,.12);color:var(--orange);}
.dl-ok{background:rgba(82,196,122,.12);color:var(--green);}
.pt-actions{display:flex;gap:4px;}
.ibt{background:none;border:none;cursor:pointer;font-size:14px;padding:3px;color:var(--muted);}

/* ── AI SUGGESTION CARD ───────────────────────────── */
.suggest-card{
  background:linear-gradient(135deg,rgba(91,163,217,.08),rgba(139,127,232,.08));
  border:1px solid rgba(91,163,217,.2);border-radius:14px;padding:14px;margin-bottom:10px;
}
.suggest-label{font-size:10px;color:var(--blue);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.suggest-item{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);}
.suggest-item:last-child{border-bottom:none;padding-bottom:0;}
.suggest-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:4px;}
.suggest-text{font-size:12px;line-height:1.4;flex:1;color:var(--text);}
.suggest-add{background:rgba(91,163,217,.15);border:1px solid rgba(91,163,217,.25);color:var(--blue);border-radius:7px;padding:4px 9px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;}

/* ── BUSINESS CARD ────────────────────────────────── */
.biz-card{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:10px;}
.biz-name{font-size:15px;font-weight:800;}
.biz-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.status-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;margin-top:7px;}
.s-todo{background:rgba(240,146,43,.18);color:var(--orange);}
.s-inprog{background:rgba(139,127,232,.18);color:var(--purple);}
.s-done{background:rgba(82,196,122,.18);color:var(--green);}
.s-quote{background:rgba(91,163,217,.18);color:var(--blue);}
.s-job{background:rgba(240,146,43,.18);color:var(--orange);}
.s-booked{background:rgba(82,196,122,.18);color:var(--green);}
.work-list{margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr);}
.work-lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;}
.wrow{display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);}
.wrow:last-of-type{border-bottom:none;}
.wchk{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;}
.wrow.wd .wchk{background:var(--green);border-color:var(--green);}
.wrow.wd .wtxt{text-decoration:line-through;color:var(--muted);}
.wtxt{font-size:12px;flex:1;line-height:1.3;}
.add-inline{display:flex;gap:6px;margin-top:8px;}
.mini-inp{flex:1;background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;outline:none;}
.mini-inp::placeholder{color:var(--dim);}
.mini-inp:focus{border-color:var(--purple);}
.mini-add{background:var(--purple);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;}

/* ── STAGE PILLS ──────────────────────────────────── */
.stage-row{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap;}
.stage-pill{font-size:10px;font-weight:600;padding:4px 9px;border-radius:8px;border:1px solid var(--bdr);cursor:pointer;background:var(--surf2);color:var(--muted);}
.stage-pill.cal{color:var(--blue);border-color:rgba(91,163,217,.3);background:rgba(91,163,217,.08);}

/* ── MEAL SECTION ─────────────────────────────────── */
.meal-time-hdr{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px;}
.meal-option-card{background:var(--surf);border:1.5px solid var(--bdr);border-radius:12px;padding:12px;margin-bottom:7px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;transition:border-color .15s;}
.meal-option-card:active{border-color:var(--green);}
.meal-icon-big{font-size:24px;flex-shrink:0;}
.meal-title{font-size:13px;font-weight:700;}
.meal-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;}
.meal-macro{font-size:10px;color:var(--green);margin-top:4px;font-weight:700;}
.best-tag{font-size:9px;font-weight:700;background:rgba(245,200,66,.15);color:var(--gold);border-radius:5px;padding:2px 6px;margin-left:6px;vertical-align:middle;}

/* ── FITNESS ──────────────────────────────────────── */
.day-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;}
.day-scroll::-webkit-scrollbar{height:0;}
.day-btn{flex:0 0 auto;padding:8px 14px;border-radius:20px;border:1.5px solid var(--bdr);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;background:var(--surf);}
.day-btn.act{background:rgba(139,127,232,.2);color:var(--purple);border-color:var(--purple);}
.day-btn.logged{background:rgba(82,196,122,.12);color:var(--green);border-color:rgba(82,196,122,.3);}
.workout-banner{background:linear-gradient(135deg,#1D1840,#1A2830);border:1px solid rgba(139,127,232,.3);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.wb-tag{font-size:10px;color:var(--purple);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.wb-name{font-size:19px;font-weight:900;margin-bottom:3px;}
.wb-focus{font-size:12px;color:var(--muted);}
.ex-card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:13px;margin-bottom:8px;}
.ex-name{font-size:14px;font-weight:800;}
.ex-sets{font-size:12px;color:var(--purple);font-weight:600;margin-top:3px;}
.ex-note{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;}
.ex-tip{font-size:11px;color:var(--orange);margin-top:4px;font-style:italic;}
.log-btn{width:100%;background:linear-gradient(135deg,var(--purple),#A594F0);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px;letter-spacing:-.2px;}
.log-btn.logged{background:linear-gradient(135deg,#1A3A20,#1A3020);color:var(--green);border:1px solid rgba(82,196,122,.3);}
.warn-box{background:rgba(240,146,43,.08);border:1px solid rgba(240,146,43,.2);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:11px;color:var(--orange);line-height:1.4;}

/* ── MORNING ROUTINE ──────────────────────────────── */
.mr-step{display:flex;align-items:center;gap:11px;background:var(--surf);border:1.5px solid var(--bdr);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .2s;}
.mr-step:active{transform:scale(.97);}
.mr-step.done{background:#142014;border-color:rgba(82,196,122,.3);}
.mr-time{font-size:10px;color:var(--muted);font-weight:700;min-width:36px;}
.mr-ico{font-size:18px;flex-shrink:0;}
.mr-name{font-size:13px;font-weight:700;flex:1;}
.mr-step.done .mr-name{color:var(--muted);text-decoration:line-through;}
.mr-chk{width:20px;height:20px;border-radius:50%;border:2px solid var(--dim);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}
.mr-step.done .mr-chk{background:var(--green);border-color:var(--green);}

/* ── CALENDAR ─────────────────────────────────────── */
.cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.cal-nav-btn{background:var(--surf);border:1px solid var(--bdr);color:var(--text);border-radius:9px;padding:7px 13px;cursor:pointer;font-size:13px;font-weight:600;}
.cw{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.cw::-webkit-scrollbar{height:0;}
.ci-wrap{min-width:390px;}
.c-head{display:grid;grid-template-columns:34px repeat(7,1fr);gap:2px;margin-bottom:3px;}
.c-dl{text-align:center;font-size:10px;color:var(--muted);font-weight:600;padding:4px 0;}
.c-dl.tdy{color:var(--purple);font-weight:800;}
.c-grid{display:grid;grid-template-columns:34px repeat(7,1fr);gap:2px;}
.c-time{font-size:9px;color:var(--dim);text-align:right;padding-right:4px;height:46px;display:flex;align-items:center;justify-content:flex-end;}
.c-cell{height:46px;border:1px solid rgba(255,255,255,.04);border-radius:5px;background:var(--surf);cursor:pointer;position:relative;overflow:hidden;transition:background .15s;}
.c-cell:hover{background:var(--surf2);}
.c-cell.tdy-c{border-color:rgba(139,127,232,.3);}
.c-ev{position:absolute;left:2px;right:2px;top:2px;border-radius:4px;padding:2px 4px;font-size:8px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.c-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--dim);opacity:0;}
.c-cell:hover .c-hint{opacity:1;}

/* ── AI COACH ─────────────────────────────────────── */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 220px);}
.chat-msgs{flex:1;overflow-y:auto;padding:0 0 10px;display:flex;flex-direction:column;gap:10px;}
.chat-msgs::-webkit-scrollbar{width:0;}
.bub{max-width:86%;padding:10px 14px;font-size:13px;line-height:1.5;border-radius:14px;}
.bub.ai{background:var(--surf);border-radius:14px 14px 14px 4px;align-self:flex-start;}
.bub.user{background:var(--purple);border-radius:14px 14px 4px 14px;align-self:flex-end;}
.bub.sys{background:rgba(82,196,122,.12);border:1px solid rgba(82,196,122,.25);color:var(--green);align-self:center;font-size:11px;border-radius:9px;padding:7px 12px;text-align:center;max-width:96%;}
.chat-bottom{flex-shrink:0;padding-top:10px;}
.chat-ctrl{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.chat-inp{flex:1;background:var(--surf);border:1.5px solid var(--bdr);border-radius:12px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;}
.chat-inp:focus{border-color:var(--purple);}
.chat-inp::placeholder{color:var(--dim);}
.send-btn{background:var(--purple);color:#fff;border:none;border-radius:12px;padding:11px 16px;font-size:17px;cursor:pointer;flex-shrink:0;}
.send-btn:disabled{opacity:.4;}
.mic-btn{width:46px;height:46px;border-radius:50%;border:2.5px solid var(--purple);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;transition:all .25s;}
.mic-btn.on{background:var(--red);border-color:var(--red);animation:mpulse 1s ease-in-out infinite;}
@keyframes mpulse{0%,100%{box-shadow:0 0 0 0 rgba(224,92,92,.4);}50%{box-shadow:0 0 0 8px rgba(224,92,92,0);}}
.voice-hint{font-size:11px;color:var(--muted);text-align:center;min-height:15px;margin-bottom:6px;}
.voice-hint.on{color:var(--red);}
.quick-chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{background:var(--surf);color:var(--muted);border:1px solid var(--bdr);border-radius:20px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.chip:active{background:rgba(139,127,232,.15);color:var(--purple);}
.dot{width:7px;height:7px;background:var(--purple);border-radius:50%;display:inline-block;animation:db 1.2s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes db{0%,80%,100%{transform:translateY(0);opacity:.4;}40%{transform:translateY(-6px);opacity:1;}}

/* ── MODAL ────────────────────────────────────────── */
.mo-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
.mo-box{background:#14142A;border-radius:22px 22px 0 0;padding:22px 18px calc(var(--sb) + 22px);width:100%;max-width:430px;max-height:88vh;overflow-y:auto;}
.mo-title{font-size:16px;font-weight:800;margin-bottom:16px;}
.f-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin:12px 0 5px;display:block;}
.f-label:first-of-type{margin-top:0;}
.f-inp{width:100%;background:var(--surf);border:1.5px solid var(--bdr);border-radius:10px;padding:10px 13px;color:var(--text);font-size:14px;outline:none;}
.f-inp:focus{border-color:var(--purple);}
.f-inp::placeholder{color:var(--dim);}
select.f-inp{-webkit-appearance:none;}
.f-colors{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.f-cdot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;}
.f-cdot.sel{border-color:#fff;}
.f-emojis{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
.f-emo{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:17px;border-radius:8px;background:var(--surf2);cursor:pointer;border:2px solid transparent;}
.f-emo.sel{border-color:var(--purple);}
.mo-actions{display:flex;gap:8px;margin-top:18px;}
.mo-cancel{flex:1;background:var(--surf2);color:var(--muted);border:1px solid var(--bdr);border-radius:11px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;}
.mo-confirm{flex:2;border:none;border-radius:11px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;color:#fff;background:var(--purple);}
.mo-confirm.g{background:var(--green);}
.mo-confirm.o{background:var(--orange);}
.link-list{background:var(--surf2);border-radius:10px;padding:8px 10px;margin-top:4px;}
.lopt{display:flex;align-items:center;gap:9px;padding:7px 0;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05);}
.lopt:last-child{border-bottom:none;}
.lopt.sel{color:var(--purple);}
.lopt-name{font-size:12px;font-weight:700;}
.lopt-sub{font-size:10px;color:var(--muted);}

/* ── CONFETTI/WIN ─────────────────────────────────── */
.win-banner{background:linear-gradient(135deg,#1E1845,#162416);border:1px solid rgba(245,200,66,.25);border-radius:14px;padding:18px;text-align:center;margin-top:6px;}
@keyframes pop{0%{transform:scale(.8);opacity:0;}70%{transform:scale(1.05);}100%{transform:scale(1);opacity:1;}}
.win-banner{animation:pop .35s ease;}

/* ── EMPTY STATE ──────────────────────────────────── */
.empty{text-align:center;padding:30px 20px;color:var(--muted);}
.empty-ico{font-size:36px;margin-bottom:8px;}
.empty-txt{font-size:14px;font-weight:600;}
.empty-sub{font-size:12px;margin-top:4px;color:var(--dim);}

/* ── GOALS ────────────────────────────────────────── */
.goal-card{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:10px;}
.goal-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.goal-txt{font-size:14px;font-weight:700;line-height:1.4;}
.goal-pct{font-size:22px;font-weight:900;}
.g-bar{background:var(--bdr);border-radius:5px;height:7px;overflow:hidden;margin:8px 0 9px;}
.g-fill{height:100%;border-radius:5px;transition:width .5s ease;}
.g-slider{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:4px;background:var(--bdr);outline:none;}
.g-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;cursor:pointer;background:var(--purple);}

.divider{height:1px;background:var(--bdr);margin:12px 0;}
</style>
</head>

<script>

const EMOJIS=['🌅','💪','🎯','📚','🌙','🧘','🏃','💧','🥗','📝','🔥','⚡','🎨','🌿','💼','🧠','🛁','☕','🍽️','🧊'];

const DESIGN_SUGGESTIONS=[

const WORKOUT_PLAN=[
  {day:1,name:'Dumbbell Push + Abs',focus:'Chest · Shoulders · Triceps · Core',type:'weights',exercises:[

    {name:'Light walk',sets:'20–30 min',note:'Easy, fresh air.'},
    {name:'Full body stretch',sets:'10–15 min',note:'30s per stretch. Chest, shoulders, hip flexors.'},
    {name:'Nutrition focus',sets:'—',note:'High protein, 3L water, early sleep.',tip:'Muscles grow on rest days — this day is as important as training'},

];

// ─── STATE ──────────────────────────────────────────────────────────────────
let S={
  habits:[
    {id:1,name:'Morning routine',icon:'🌅',streak:0,done:false},
    {id:2,name:'Workout done',icon:'💪',streak:0,done:false},

    {id:4,name:'3 litres water',icon:'💧',streak:0,done:false},
    {id:5,name:'Deep work block',icon:'🎯',streak:0,done:false},

  ],
  morningRoutine:[
    {id:1,time:'06:30',icon:'⏰',name:'Wake up & get up',done:false},
    {id:2,time:'06:35',icon:'💧',name:'Drink 500ml water',done:false},
    {id:3,time:'06:45',icon:'🚿',name:'Cold shower',done:false},
    {id:4,time:'07:00',icon:'🍳',name:'Breakfast — eggs, sourdough, avocado, OJ',done:false},

    {id:6,time:'07:30',icon:'📋',name:'Review tasks & plan the day',done:false},

  tasks:[
    {id:1,name:'Chase outstanding invoice — Smith Garden',priority:'urgent',deadline:'2025-06-17',done:false,notes:''},

  ],
  goals:[
    {id:1,cat:'Graphic Design',text:'Land 2 new clients this month',progress:30,color:'#8B7FE8',tasks:[]},
    {id:2,cat:'Landscaping',text:'Complete 5 jobs this week',progress:60,color:'#52C47A',tasks:[]},
    {id:3,cat:'Holiday Body',text:'Shredded and strong for holiday',progress:20,color:'#F0922B',tasks:[]},
  ],
  designClients:[
    {id:1,name:'Example Client',contact:'client@example.com',status:'inprog',notes:'Logo redesign',tasks:[{id:1,text:'Create logo concepts',done:false}]},
  ],
  gardenJobs:[
    {id:1,name:'Smith Garden',contact:'07700 000000',address:'12 Oak Lane',stage:'quote',amount:'',date:'',notes:'Lawn + hedges',tasks:[]},
    {id:2,name:'Jones Patio',contact:'07800 000000',address:'45 Birch Rd',stage:'job',amount:'£450',date:'',notes:'Full clearance',tasks:[]},
  ],
  workoutDay:1,loggedDays:[],
  calEvents:[],
  lastReset:new Date().toDateString(),
};

let tab='today',bizSub='design';
let chatMsgs=[{role:'ai',text:"Hey! Tap 🎤 to speak — I'll hear you and act on it. I can add tasks, jobs, events and habits just by you asking. What do you need right now?"}];
let chatLoading=false,recognition=null,isListening=false;
let selColor=COLORS[0],selEmoji=EMOJIS[0],selEvCol=EVCOLS[0],editId=null,calOff=0,selLinkId=null,selLinkType=null;

// ─── PERSIST ────────────────────────────────────────────────────────────────
function save(){try{localStorage.setItem('mylife_v7',JSON.stringify(S));}catch(e){}}
function load(){try{const d=localStorage.getItem('mylife_v7');if(d){const p=JSON.parse(d);S={...S,...p};}}catch(e){}}
function resetDay(){const t=new Date().toDateString();if(S.lastReset!==t){S.habits=S.habits.map(h=>({...h,done:false}));if(S.morningRoutine)S.morningRoutine=S.morningRoutine.map(s=>({...s,done:false}));S.lastReset=t;save();}}

// ─── BOOT ───────────────────────────────────────────────────────────────────
load();resetDay();
(()=>{
  const n=new Date(),h=n.getHours();
  document.getElementById('fdate').textContent=`${DAY_NAMES[n.getDay()]} · ${n.getDate()} ${MONTHS[n.getMonth()]}`;
  document.getElementById('fgreet').textContent=h<12?'Morning ☀️':h<17?'Afternoon 👋':'Evening 🌙';
})();
render();

// ─── HEADER ─────────────────────────────────────────────────────────────────
function updHead(){
  const done=S.habits.filter(h=>h.done).length,tot=S.habits.length;
  const pct=tot?Math.round((done/tot)*100):0;
  const c=2*Math.PI*23;
  document.getElementById('rarc').style.strokeDashoffset=c-(pct/100)*c;
  document.getElementById('rpct').textContent=pct+'%';
  const today=new Date();
  const overdue=S.tasks.filter(t=>!t.done&&t.deadline&&new Date(t.deadline)<today).length;
  const dueSoon=S.tasks.filter(t=>!t.done&&t.deadline&&new Date(t.deadline)<=new Date(Date.now()+2*864e5)&&new Date(t.deadline)>=today).length;
  const pills=document.getElementById('pillbar');
  let ph=`<span class="fpill ${done===tot&&tot>0?'good':done>tot/2?'warn':''}">${done}/${tot} habits</span>`;
  if(overdue>0)ph+=`<span class="fpill danger">⚠ ${overdue} overdue</span>`;
  if(dueSoon>0)ph+=`<span class="fpill warn">⏰ ${dueSoon} due soon</span>`;
  const todayEvs=S.calEvents.filter(e=>new Date(e.date).toDateString()===today.toDateString());
  if(todayEvs.length)ph+=`<span class="fpill">📅 ${todayEvs.length} today</span>`;
  if((S.loggedDays||[]).includes(S.workoutDay))ph+=`<span class="fpill good">💪 Workout done</span>`;
  pills.innerHTML=ph;
}

// ─── ROUTING ────────────────────────────────────────────────────────────────
function go(t){
  tab=t;
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('act'));
  document.getElementById('nb-'+t).classList.add('act');
  document.getElementById('scroll').scrollTop=0;
  render();
}
function render(){updHead();const fns={today:rToday,tasks:rTasks,business:rBusiness,fitness:rFitness,calendar:rCalendar,coach:rCoach};(fns[tab]||rToday)();}

// ─── HELPERS ────────────────────────────────────────────────────────────────
function fmtH(h){return h===12?'12pm':h<12?h+'am':(h-12)+'pm';}
function weekDates(off){const n=new Date(),d=n.getDay(),mo=new Date(n);mo.setDate(n.getDate()-d+1+(off*7));return Array.from({length:7},(_,i)=>{const x=new Date(mo);x.setDate(mo.getDate()+i);return x;});}
function showMo(html){document.getElementById('mobox').innerHTML=html;document.getElementById('molay').style.display='flex';}
function closeMo(){document.getElementById('molay').style.display='none';editId=null;selLinkId=null;selLinkType=null;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMo();});
function selMoCol(c,cls){selColor=c;document.querySelectorAll('.'+cls).forEach(el=>el.classList.toggle('sel',el.style.background===c||el.style.backgroundColor===c));}
function selMoEmo(e,cls){selEmoji=e;document.querySelectorAll('.'+cls).forEach(el=>el.classList.toggle('sel',el.textContent===e));}

function dlInfo(dl){
  if(!dl)return{label:'No deadline',cls:'dl-ok',days:999};
  const now=new Date();now.setHours(0,0,0,0);const d=new Date(dl);d.setHours(0,0,0,0);
  const diff=Math.round((d-now)/864e5);
  if(diff<0)return{label:`${Math.abs(diff)}d overdue`,cls:'dl-over',days:diff};
  if(diff===0)return{label:'Due today',cls:'dl-today',days:0};
  if(diff<=3)return{label:`${diff}d left`,cls:'dl-soon',days:diff};
  return{label:`${diff}d left`,cls:'dl-ok',days:diff};
}
const priOrd={urgent:0,high:1,medium:2,low:3};
const priCol={urgent:'var(--red)',high:'var(--orange)',medium:'var(--purple)',low:'var(--green)'};

// ─── TODAY ──────────────────────────────────────────────────────────────────
function rToday(){
  const done=S.habits.filter(h=>h.done).length,allDone=done===S.habits.length&&S.habits.length>0;
  const todayEvs=S.calEvents.filter(e=>new Date(e.date).toDateString()===new Date().toDateString()).sort((a,b)=>a.hour-b.hour);
  const wp=WORKOUT_PLAN.find(p=>p.day===(S.workoutDay||1));
  const urgentNow=S.tasks.filter(t=>!t.done&&t.deadline).sort((a,b)=>dlInfo(a.deadline).days-dlInfo(b.deadline).days).slice(0,2);
  const mrDone=S.morningRoutine.filter(s=>s.done).length,mrTot=S.morningRoutine.length;

  let h=``;

  // Morning routine progress if not all done
  if(mrDone<mrTot){
    h+=`<div class="focus-card" style="cursor:pointer" onclick="go('fitness');rFitness()">
      <div class="fc-label">🌅 Morning Routine</div>
      <div class="fc-title">${mrDone}/${mrTot} steps done</div>
      <div class="fc-sub">Tap to open your morning checklist</div>
      <div style="background:rgba(255,255,255,.08);border-radius:6px;height:5px;overflow:hidden;margin-top:12px"><div style="height:100%;background:var(--green);border-radius:6px;width:${Math.round(mrDone/mrTot*100)}%;transition:width .4s"></div></div>
    </div>`;
  }

  // Habits
  h+=`<div class="sec-hdr"><div><div class="sec-title">Habits</div><div class="sec-sub">Tap to check off</div></div><button class="add-btn" onclick="openHabitMo()">+</button></div>`;
  h+=`<div class="habit-wrap">`;
  S.habits.forEach(hb=>{
    h+=`<div class="hcard${hb.done?' done':''}" onclick="togH(${hb.id})">
      <div class="hchk">${hb.done?'✓':''}</div>
      <span class="hico">${hb.icon}</span>
      <div class="hinfo"><div class="hname">${hb.name}</div>${hb.streak>0?`<div class="hstreak">🔥 ${hb.streak}-day streak</div>`:''}</div>
      <button class="ibt" onclick="event.stopPropagation();delH(${hb.id})">🗑</button>
    </div>`;
  });
  h+=`</div>`;
  if(allDone)h+=`<div class="win-banner"><div style="font-size:32px;margin-bottom:6px">🏆</div><div style="font-size:17px;font-weight:900;margin-bottom:3px">Perfect day!</div><div style="font-size:12px;color:var(--muted)">All habits done. You're building something real.</div></div>`;

  // Urgent tasks snapshot
  if(urgentNow.length){
    h+=`<div class="divider"></div><div class="sec-hdr"><div><div class="sec-title">Needs Doing</div><div class="sec-sub">Most urgent first</div></div><button class="add-btn" style="background:var(--red)" onclick="go('tasks')">→</button></div>`;
    urgentNow.forEach(t=>{const di=dlInfo(t.deadline);h+=`<div class="ptask pri-${t.priority}" style="cursor:pointer" onclick="go('tasks')"><div class="pt-row"><div class="pt-chk" onclick="event.stopPropagation();togTask(${t.id})">${t.done?'✓':''}</div><div class="pt-body"><div class="pt-name">${t.name}</div><div class="pt-meta"><span class="dl-badge ${di.cls}">${di.label}</span></div></div></div></div>`;});
  }

  // Today workout
  if(wp&&wp.type!=='rest'){
    h+=`<div class="divider"></div><div class="focus-card" style="cursor:pointer" onclick="go('fitness')">
      <div class="fc-label">💪 Day ${S.workoutDay} of 7</div>
      <div class="fc-title">${wp.name}</div>
      <div class="fc-sub">${wp.focus}</div>
      <button class="fc-action" onclick="event.stopPropagation();go('fitness')">${(S.loggedDays||[]).includes(S.workoutDay)?'✓ Logged':'Open workout →'}</button>
    </div>`;
  }

  // Today schedule
  if(todayEvs.length){
    h+=`<div class="divider"></div><div class="sec-hdr"><div class="sec-title">Today's Schedule</div></div>`;
    todayEvs.forEach(e=>{h+=`<div class="biz-card" style="border-left:4px solid ${e.color||'#8B7FE8'}"><div class="biz-name">${e.title}</div><div class="biz-sub">${fmtH(e.hour)}${e.notes?' · '+e.notes:''}</div></div>`;});
  }

  document.getElementById('main').innerHTML=h;
}

function togH(id){S.habits=S.habits.map(h=>{if(h.id!==id)return h;const d=!h.done;return{...h,done:d,streak:d?h.streak+1:Math.max(0,h.streak-1)};});save();render();}
function delH(id){if(!confirm('Delete?'))return;S.habits=S.habits.filter(h=>h.id!==id);save();render();}
function openHabitMo(){
  selEmoji=EMOJIS[0];

// ─── VOICE ──────────────────────────────────────────────────────────────────
function initVoice(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window))return null;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const r=new SR();r.continuous=false;r.interimResults=true;r.lang='en-GB';
  r.onresult=e=>{let f='',i='';for(let x=e.resultIndex;x<e.results.length;x++){if(e.results[x].isFinal)f+=e.results[x][0].transcript;else i+=e.results[x][0].transcript;}const el=document.getElementById('cinp');if(el)el.value=f||i;const vs=document.getElementById('vhint');if(vs&&i)vs.textContent='Hearing: "'+i+'"';};
  r.onend=()=>{isListening=false;const vb=document.getElementById('vbtn');if(vb)vb.classList.remove('on');const vs=document.getElementById('vhint');if(vs){vs.textContent='';vs.className='voice-hint';}const el=document.getElementById('cinp');if(el&&el.value.trim())setTimeout(sendChat,300);};
  r.onerror=e=>{isListening=false;const vb=document.getElementById('vbtn');if(vb)vb.classList.remove('on');const vs=document.getElementById('vhint');if(vs)vs.textContent=e.error==='not-allowed'?'Mic access denied — check Safari settings':'Try again';};
  return r;
}
function toggleVoice(){
  if(!recognition)recognition=initVoice();
  if(!recognition){const vs=document.getElementById('vhint');if(vs)vs.textContent='Voice not supported in this browser';return;}
  if(isListening){recognition.stop();isListening=false;}
  else{try{recognition.start();isListening=true;const vb=document.getElementById('vbtn');if(vb)vb.classList.add('on');const vs=document.getElementById('vhint');if(vs){vs.textContent='Listening… speak now';vs.className='voice-hint on';}const el=document.getElementById('cinp');if(el)el.value='';}catch(e){isListening=false;}}
}

    chatMsgs.push({role:'ai',text:reply.replace(/<ACTION>.*?<\/ACTION>/gs,'').trim()});
    acts.forEach(act=>{try{
      if(act.type==='add_calendar_event'){S.calEvents.push({id:Date.now()+Math.random(),title:act.title,date:act.date||new Date().toISOString().split('T')[0],hour:Number(act.hour)||9,notes:act.notes||'',color:act.color||'#8B7FE8',linkedId:null,linkedType:null,linkedName:null});chatMsgs.push({role:'sys',text:'📅 Added to calendar: "'+act.title+'"'});}
      else if(act.type==='add_garden_job'){S.gardenJobs.push({id:Date.now()+Math.random(),name:act.name,contact:act.contact||'',address:act.address||'',stage:act.stage||'quote',amount:act.amount||'',date:act.date||'',notes:act.notes||'',tasks:[]});chatMsgs.push({role:'sys',text:'🌿 Garden job added: "'+act.name+'"'});}
      else if(act.type==='add_design_client'){S.designClients.push({id:Date.now()+Math.random(),name:act.name,contact:act.contact||'',status:act.status||'todo',notes:act.notes||'',tasks:[]});chatMsgs.push({role:'sys',text:'🎨 Client added: "'+act.name+'"'});}
      else if(act.type==='add_habit'){S.habits.push({id:Date.now()+Math.random(),name:act.name,icon:act.icon||'⚡',streak:0,done:false});chatMsgs.push({role:'sys',text:'✅ Habit added: "'+act.name+'"'});}
      else if(act.type==='add_goal'){S.goals.push({id:Date.now()+Math.random(),cat:act.cat,text:act.text,progress:0,color:act.color||'#8B7FE8',tasks:[]});chatMsgs.push({role:'sys',text:'🎯 Goal added: "'+act.text+'"'});}
      else if(act.type==='add_task'){S.tasks.push({id:Date.now()+Math.random(),name:act.name,priority:act.priority||'medium',deadline:act.deadline||'',notes:act.notes||'',done:false});chatMsgs.push({role:'sys',text:'📋 Task added: "'+act.name+'"'});}
      save();
    }catch(e){}});
  }catch(e){chatMsgs.push({role:'ai',text:'Connection error — try again.'});}
  chatLoading=false;rCoach();
}
</script>
